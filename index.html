<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Video Editor Studio PRO</title>

<style>
body {
  margin: 0;
  background: #0b0b0f;
  color: white;
  font-family: Arial;
}

h1 {
  text-align: center;
  margin: 10px;
  font-size: 20px;
  color: #00ffcc;
}

.layout {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

video, canvas {
  width: 420px;
  background: black;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,255,204,0.2);
}

/* 🧠 PANEL SYSTEM (jak AE) */
.panel {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: 90%;
  margin: 20px auto;
}

/* 📦 KARTY */
.card {
  background: #151520;
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.card h3 {
  margin: 5px 0;
  font-size: 12px;
  color: #00ffcc;
}

/* 🎚 SUWAKI PRO */
input[type="range"] {
  width: 100%;
  accent-color: #00ffcc;
}

/* 🔘 BUTTONS */
button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 8px;
}

button:hover {
  background: #00e6b8;
}

label {
  font-size: 11px;
}

/* TOGGLES */
.toggle {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
}
</style>

</head>

<body>

<h1>🎬 VIDEO EDITOR STUDIO PRO</h1>

<input type="file" id="fileInput">

<div class="layout">
  <video id="video" controls></video>
  <canvas id="canvas"></canvas>
</div>

<div class="panel">

  <!-- 🎧 BEAT -->
  <div class="card">
    <h3>🎧 BEAT ENGINE</h3>

    <label>Shake</label>
    <input type="range" id="shake" min="0" max="20" value="5">

    <label>Zoom</label>
    <input type="range" id="zoom" min="1" max="2" step="0.1" value="1.05">

    <label>Intensity</label>
    <input type="range" id="intensity" min="0" max="2" step="0.1" value="1">

    <button id="analyze">Analyze Beat</button>
  </div>

  <!-- 🎨 LOOK -->
  <div class="card">
    <h3>🎨 COLOR / LOOK</h3>

    <label>Cinematic</label>
    <input type="range" id="cinema" min="0" max="2" step="0.1" value="1">

    <label>Contrast Boost</label>
    <input type="range" id="contrast" min="1" max="2" step="0.1" value="1.2">

    <label>Saturation</label>
    <input type="range" id="sat" min="0" max="2" step="0.1" value="1.2">

    <label>Denoise</label>
    <input type="range" id="denoise" min="0" max="3" step="0.1" value="0">
  </div>

  <!-- 🎬 EDIT -->
  <div class="card">
    <h3>✂️ EDIT</h3>

    <label>Start Trim</label>
    <input type="range" id="startTrim" min="0" max="10" step="0.1" value="0">

    <label>End Trim</label>
    <input type="range" id="endTrim" min="1" max="60" step="0.1" value="10">

    <label>Speed</label>
    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

    <label>Quality</label>
    <select id="quality">
      <option value="low">Low</option>
      <option value="high">High</option>
    </select>
  </div>

  <!-- ⚙️ FX -->
  <div class="card">
    <h3>⚡ FX</h3>

    <label>Glitch</label>
    <input type="range" id="glitch" min="0" max="20" value="0">

    <label>RGB Split</label>
    <input type="range" id="rgb" min="0" max="10" value="0">

    <label>Vignette</label>
    <input type="range" id="vignette" min="0" max="1" step="0.1" value="0">

    <label>Grain</label>
    <input type="range" id="grain" min="0" max="50" value="0">

    <div class="toggle">
      <label><input type="checkbox" id="loop"> Loop</label>
      <label><input type="checkbox" id="freeze"> Freeze</label>
    </div>

    <button id="export">Export</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
