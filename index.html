<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Video Editor PRO+</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin: 10px;
}

.layout {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 15px;
}

video, canvas {
  width: 420px;
  background: black;
  border-radius: 10px;
}

.panel {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 60%;
  margin-left: auto;
  margin-right: auto;
}

input, select, button {
  padding: 5px;
}

button {
  background: #00ffcc;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

label {
  font-size: 12px;
}
</style>

</head>

<body>

<h1>🎬 VIDEO EDITOR PRO+</h1>

<input type="file" id="fileInput" accept="video/*">

<div class="layout">
  <video id="video" controls></video>
  <canvas id="canvas"></canvas>
</div>

<div class="panel">

  <!-- 🎧 BEAT -->
  <div>
    <label>Shake</label>
    <input type="range" id="shake" min="0" max="20" value="5">

    <label>Zoom</label>
    <input type="range" id="zoom" min="1" max="2" step="0.1" value="1.05">

    <label>Intensity</label>
    <input type="range" id="intensity" min="0" max="2" step="0.1" value="1">

    <button id="analyze">Analyze Beat</button>
  </div>

  <!-- 🎨 LOOK -->
  <div>
    <label>Cinematic</label>
    <input type="range" id="cinema" min="0" max="2" step="0.1" value="1">

    <label>Denoise</label>
    <input type="range" id="denoise" min="0" max="3" step="0.1" value="0">

    <label>Vignette</label>
    <input type="range" id="vignette" min="0" max="1" step="0.1" value="0">
  </div>

  <!-- 🎬 EDIT -->
  <div>
    <label>Start Trim</label>
    <input type="range" id="startTrim" min="0" max="10" step="0.1" value="0">

    <label>End Trim</label>
    <input type="range" id="endTrim" min="1" max="60" step="0.1" value="10">

    <label>Quality</label>
    <select id="quality">
      <option value="low">Low</option>
      <option value="high">High</option>
    </select>
  </div>

  <!-- ⚙️ TOGGLE -->
  <div>
    <label><input type="checkbox" id="loop"> Loop</label><br>
    <label><input type="checkbox" id="freeze"> Freeze Frame</label><br>

    <button id="export">Export Video</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
