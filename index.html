<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Beat Sync Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎧 Beat Sync Video Editor</h1>

<input type="file" id="videoInput" accept="video/*">

<div class="layout">
  <video id="video" controls></video>
  <canvas id="canvas"></canvas>
</div>

<audio id="audio" controls></audio>

<div class="panel">

  <label>Shake</label>
  <input type="range" id="shake" min="0" max="20" value="5">

  <label>Zoom Pulse</label>
  <input type="range" id="zoom" min="1" max="2" step="0.1" value="1.05">

  <button id="analyze">Analyze Beat</button>
  <button id="export">Export Video</button>

</div>

<script src="script.js"></script>

</body>
</html>
