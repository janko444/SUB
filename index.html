<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Studio Editor PRO X</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0f0f1a, #050507);
  color: white;
  font-family: Arial;
}

/* HEADER */
h1 {
  text-align: center;
  margin: 10px;
  font-size: 22px;
  color: #00ffcc;
  letter-spacing: 1px;
}

/* PREVIEW */
.layout {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

video, canvas {
  width: 420px;
  border-radius: 14px;
  box-shadow: 0 0 25px rgba(0,255,204,0.15);
  background: black;
}

/* MAIN GRID */
.panel {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 92%;
  margin: 20px auto;
}

/* GLASS CARDS */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,255,204,0.1);
  border-radius: 14px;
  padding: 12px;
  transition: 0.2s;
}

.card:hover {
  border: 1px solid rgba(0,255,204,0.4);
}

/* TITLE */
.card h3 {
  margin: 5px 0 10px;
  font-size: 12px;
  color: #00ffcc;
  letter-spacing: 1px;
}

/* SLIDERS */
input[type="range"] {
  width: 100%;
  accent-color: #00ffcc;
  margin-bottom: 8px;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 8px;
  background: linear-gradient(90deg, #00ffcc, #00c3ff);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  color: #000;
  margin-top: 5px;
}

button:hover {
  opacity: 0.9;
}

/* SELECT */
select {
  width: 100%;
  padding: 6px;
  border-radius: 8px;
  background: #111;
  color: white;
  border: 1px solid #00ffcc33;
}

/* TOGGLES */
.row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-top: 5px;
}
</style>

</head>

<body>

<h1>🎬 STUDIO EDITOR PRO X</h1>

<input type="file" id="fileInput">

<div class="layout">
  <video id="video" controls></video>
  <canvas id="canvas"></canvas>
</div>

<div class="panel">

  <!-- 🎧 BEAT -->
  <div class="card">
    <h3>🎧 BEAT ENGINE</h3>

    <input type="range" id="shake" min="0" max="20" value="5">
    <input type="range" id="zoom" min="1" max="2" step="0.1" value="1.05">
    <input type="range" id="intensity" min="0" max="2" step="0.1" value="1">

    <button id="analyze">Analyze Beat</button>
  </div>

  <!-- 🎨 COLOR -->
  <div class="card">
    <h3>🎨 COLOR GRADE</h3>

    <input type="range" id="cinema" min="0" max="2" step="0.1" value="1">
    <input type="range" id="contrast" min="1" max="2" step="0.1" value="1.2">
    <input type="range" id="sat" min="0" max="2" step="0.1" value="1.2">

    <select id="preset">
      <option>Cinematic</option>
      <option>Neon</option>
      <option>Clean</option>
      <option>Dark Mood</option>
    </select>
  </div>

  <!-- ✂️ EDIT -->
  <div class="card">
    <h3>✂️ EDIT TOOLS</h3>

    <input type="range" id="startTrim" min="0" max="10" step="0.1" value="0">
    <input type="range" id="endTrim" min="1" max="60" step="0.1" value="10">

    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

    <div class="row">
      <label><input type="checkbox" id="loop"> Loop</label>
      <label><input type="checkbox" id="freeze"> Freeze</label>
    </div>
  </div>

  <!-- ⚡ FX -->
  <div class="card">
    <h3>⚡ EFFECTS</h3>

    <input type="range" id="glitch" min="0" max="20" value="0">
    <input type="range" id="rgb" min="0" max="10" value="0">
    <input type="range" id="vignette" min="0" max="1" step="0.1" value="0">
    <input type="range" id="grain" min="0" max="50" value="0">

    <button id="export">Export Video</button>
  </div>

  <!-- 🧠 ADVANCED -->
  <div class="card">
    <h3>🧠 ADVANCED</h3>

    <select id="quality">
      <option value="low">Low Perf</option>
      <option value="high">High Quality</option>
    </select>

    <input type="range" id="sharp" min="0" max="2" step="0.1" value="0">
    <input type="range" id="denoise" min="0" max="3" step="0.1" value="0">
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
